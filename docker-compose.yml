# ═══════════════════════════════════════════════════════════════════════════════
# ICI Platform — Docker Compose (base configuration)
# Usage:
#   Development : docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Production  : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Quick start : docker compose up   (uses dev defaults)
# ═══════════════════════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service"

x-restart: &restart-policy
  restart: unless-stopped

x-healthcheck-defaults: &hc-defaults
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  # Public-facing (nginx → backend/ml)
  ici_public:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Application tier (backend, worker, agents)
  ici_app:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.1.0/24

  # Data tier (postgres, redis, qdrant) — isolated from public
  ici_data:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24

  # ML tier (mlflow, ml-inference)
  ici_ml:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.3.0/24

  # Observability (prometheus, grafana)
  ici_obs:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.4.0/24

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  # ── Databases ─────────────────────────────────────────
  postgres_data:
    driver: local
    labels:
      com.ici.description: "PostgreSQL 16 data directory"

  postgres_backups:
    driver: local
    labels:
      com.ici.description: "PostgreSQL WAL + logical backups"

  redis_data:
    driver: local
    labels:
      com.ici.description: "Redis AOF persistence"

  qdrant_data:
    driver: local
    labels:
      com.ici.description: "Qdrant vector index storage"

  qdrant_snapshots:
    driver: local
    labels:
      com.ici.description: "Qdrant collection snapshots"

  # ── ML ────────────────────────────────────────────────
  mlflow_artifacts:
    driver: local
    labels:
      com.ici.description: "MLflow run artifacts (models, plots)"

  ml_models:
    driver: local
    labels:
      com.ici.description: "Downloaded sentence-transformers / LightGBM models"

  # ── Observability ──────────────────────────────────────
  prometheus_data:
    driver: local

  grafana_data:
    driver: local

  # ── Nginx ─────────────────────────────────────────────
  nginx_certs:
    driver: local

  nginx_logs:
    driver: local

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │  INFRASTRUCTURE — DATABASES                                          │
  # └──────────────────────────────────────────────────────────────────────┘

  postgres:
    image: postgres:16-alpine
    <<: *restart-policy
    container_name: ici_postgres
    hostname: postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ici}
      POSTGRES_USER:     ${POSTGRES_USER:-ici}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # Performance tuning (overrideable via env)
      POSTGRES_SHARED_BUFFERS:       ${POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${POSTGRES_EFFECTIVE_CACHE_SIZE:-768MB}
      POSTGRES_WORK_MEM:             ${POSTGRES_WORK_MEM:-16MB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - ici_data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ici} -d ${POSTGRES_DB:-ici}"]
      <<: *hc-defaults
    logging: *default-logging
    labels:
      com.ici.service: "postgres"
      com.ici.tier: "data"

  redis:
    image: redis:7.2-alpine
    <<: *restart-policy
    container_name: ici_redis
    hostname: redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?required}
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - ici_data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *hc-defaults
    logging: *default-logging
    labels:
      com.ici.service: "redis"
      com.ici.tier: "data"

  qdrant:
    image: qdrant/qdrant:v1.9.2
    <<: *restart-policy
    container_name: ici_qdrant
    hostname: qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 4
      QDRANT__STORAGE__HNSW_INDEX__M: 16
      QDRANT__STORAGE__HNSW_INDEX__EF_CONSTRUCT: 128
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    networks:
      - ici_data
      - ici_ml
    ports:
      - "${QDRANT_PORT:-6333}:6333"        # REST
      - "${QDRANT_GRPC_PORT:-6334}:6334"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      <<: *hc-defaults
    logging: *default-logging
    labels:
      com.ici.service: "qdrant"
      com.ici.tier: "data"

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │  ML INFRASTRUCTURE                                                    │
  # └──────────────────────────────────────────────────────────────────────┘

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    <<: *restart-policy
    container_name: ici_mlflow
    hostname: mlflow
    command: >
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI}
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-/mlflow/artifacts}
      --host 0.0.0.0
      --port 5000
      --workers 2
      --gunicorn-opts "--timeout 120"
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI:?required}
      MLFLOW_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-/mlflow/artifacts}
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - ici_data
      - ici_ml
      - ici_obs
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      <<: *hc-defaults
    logging: *default-logging
    labels:
      com.ici.service: "mlflow"
      com.ici.tier: "ml"

  ml-inference:
    build:
      context: .
      dockerfile: docker/ml/Dockerfile
      target: production
      args:
        PYTHON_VERSION: "3.11"
    <<: *restart-policy
    container_name: ici_ml_inference
    hostname: ml-inference
    command: ["python", "-m", "cost_prediction.inference.api"]
    environment:
      ENVIRONMENT:          ${ENVIRONMENT:-development}
      ML_MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      ML_MLFLOW_REGISTRY_NAME: ${ML_MLFLOW_REGISTRY_NAME:-cost-predictor}
      ML_DATABASE_URL:      ${ML_DATABASE_URL:-postgresql+asyncpg://ici:${POSTGRES_PASSWORD}@postgres:5432/ici}
      ML_REDIS_URL:         ${ML_REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      ML_HOST:              0.0.0.0
      ML_PORT:              8002
      ML_USE_MOCK_EMBEDDER: ${ML_USE_MOCK_EMBEDDER:-false}
      VECTOR_BACKEND:       ${VECTOR_BACKEND:-pgvector}
      QDRANT_URL:           ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY:       ${QDRANT_API_KEY:-}
    volumes:
      - ml_models:/app/.cache/huggingface
      - mlflow_artifacts:/mlflow/artifacts:ro
    networks:
      - ici_app
      - ici_data
      - ici_ml
    ports:
      - "${ML_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      <<: *hc-defaults
      start_period: 60s
    logging: *default-logging
    labels:
      com.ici.service: "ml-inference"
      com.ici.tier: "ml"

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │  APPLICATION TIER                                                     │
  # └──────────────────────────────────────────────────────────────────────┘

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
      args:
        PYTHON_VERSION: "3.11"
    <<: *restart-policy
    container_name: ici_backend
    hostname: backend
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${BACKEND_WORKERS:-4}
      --log-config /app/logging.json
      --no-access-log
    environment:
      ENVIRONMENT:          ${ENVIRONMENT:-development}
      DATABASE_URL:         ${DATABASE_URL:?required}
      REDIS_URL:            ${REDIS_CACHE_URL:?required}
      REDIS_QUEUE_URL:      ${REDIS_QUEUE_URL:-redis://:${REDIS_PASSWORD}@redis:6379/1}
      SECRET_KEY:           ${SECRET_KEY:?required}
      DEBUG:                ${DEBUG:-false}
      LOG_LEVEL:            ${LOG_LEVEL:-INFO}
      LOG_JSON:             ${LOG_JSON:-true}
      APP_VERSION:          ${APP_VERSION:-1.0.0}
      CORS_ORIGINS:         ${CORS_ORIGINS:-["http://localhost:3000"]}
      OTEL_ENABLED:         ${OTEL_ENABLED:-false}
      OTEL_ENDPOINT:        ${OTEL_ENDPOINT:-}
      VECTOR_BACKEND:       ${VECTOR_BACKEND:-pgvector}
      QDRANT_URL:           ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY:       ${QDRANT_API_KEY:-}
      ML_INFERENCE_URL:     http://ml-inference:8002
    volumes:
      - ./backend/src:/app/src:ro
    networks:
      - ici_public
      - ici_app
      - ici_data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      <<: *hc-defaults
    logging: *default-logging
    labels:
      com.ici.service: "backend"
      com.ici.tier: "app"

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    <<: *restart-policy
    container_name: ici_worker
    hostname: worker
    command: >
      python -m arq src.worker.WorkerSettings
    environment:
      ENVIRONMENT:      ${ENVIRONMENT:-development}
      DATABASE_URL:     ${DATABASE_URL:?required}
      REDIS_URL:        ${REDIS_QUEUE_URL:-redis://:${REDIS_PASSWORD}@redis:6379/1}
      REDIS_CACHE_URL:  ${REDIS_CACHE_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}
      SECRET_KEY:       ${SECRET_KEY:?required}
      LOG_LEVEL:        ${LOG_LEVEL:-INFO}
      LOG_JSON:         ${LOG_JSON:-true}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      ML_INFERENCE_URL:   http://ml-inference:8002
    volumes:
      - ./backend/src:/app/src:ro
    networks:
      - ici_app
      - ici_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import arq; print(\"ok\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    labels:
      com.ici.service: "worker"
      com.ici.tier: "app"

  rfq-agent:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    <<: *restart-policy
    container_name: ici_rfq_agent
    hostname: rfq-agent
    command: ["python", "-m", "rfq_agent.main", "serve", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      ENVIRONMENT:          ${ENVIRONMENT:-development}
      RFQ_DATABASE_URL:     ${RFQ_DATABASE_URL:-${DATABASE_URL}}
      RFQ_REDIS_URL:        ${RFQ_REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/2}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:?required}
      RFQ_SMTP_HOST:        ${RFQ_SMTP_HOST:-smtp.gmail.com}
      RFQ_SMTP_PORT:        ${RFQ_SMTP_PORT:-587}
      RFQ_SMTP_USERNAME:    ${RFQ_SMTP_USERNAME:-}
      RFQ_SMTP_PASSWORD:    ${RFQ_SMTP_PASSWORD:-}
      RFQ_SMTP_FROM_EMAIL:  ${RFQ_SMTP_FROM_EMAIL:-procurement@example.com}
      RFQ_MAX_EMAILS_PER_HOUR: ${RFQ_MAX_EMAILS_PER_HOUR:-20}
      RFQ_PLAYWRIGHT_HEADLESS: "true"
    networks:
      - ici_app
      - ici_data
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    labels:
      com.ici.service: "rfq-agent"
      com.ici.tier: "app"
    profiles:
      - agents

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │  INGRESS                                                              │
  # └──────────────────────────────────────────────────────────────────────┘

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    <<: *restart-policy
    container_name: ici_nginx
    hostname: nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_logs:/var/log/nginx
    networks:
      - ici_public
      - ici_obs
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/health || exit 1"]
      <<: *hc-defaults
    logging: *default-logging
    labels:
      com.ici.service: "nginx"
      com.ici.tier: "public"

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │  OBSERVABILITY                                                        │
  # └──────────────────────────────────────────────────────────────────────┘

  prometheus:
    image: prom/prometheus:v2.52.0
    <<: *restart-policy
    container_name: ici_prometheus
    hostname: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ici_obs
      - ici_app
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      <<: *hc-defaults
    logging: *default-logging
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.4.2
    <<: *restart-policy
    container_name: ici_grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?required}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_DOMAIN:           localhost
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - ici_obs
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      <<: *hc-defaults
    logging: *default-logging
    profiles:
      - observability

  # ┌──────────────────────────────────────────────────────────────────────┐
  # │  DATABASE UTILITIES                                                   │
  # └──────────────────────────────────────────────────────────────────────┘

  migrate:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    container_name: ici_migrate
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
    volumes:
      - ./backend/alembic:/app/alembic:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
    networks:
      - ici_data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: ici_db_backup
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_DB:       ${POSTGRES_DB:-ici}
      POSTGRES_USER:     ${POSTGRES_USER:-ici}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      SCHEDULE:          "@daily"
      BACKUP_KEEP_DAYS:  7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    volumes:
      - postgres_backups:/backups
    networks:
      - ici_data
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
