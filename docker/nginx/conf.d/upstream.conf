upstream backend {
    least_conn;
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream ml_inference {
    server ml-inference:8002 max_fails=3 fail_timeout=30s;
    keepalive 8;
}

upstream rfq_agent {
    server rfq-agent:8001 max_fails=3 fail_timeout=30s;
    keepalive 8;
}

upstream mlflow {
    server mlflow:5000 max_fails=2 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;

    # Health check endpoint — no auth, no logging
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Backend API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req  zone=api_general burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/v[0-9]+/auth/ {
        limit_req  zone=api_auth burst=5 nodelay;
        limit_conn conn_limit 5;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── ML Inference ───────────────────────────────────────────────────────
    location /ml/ {
        limit_req  zone=api_general burst=10 nodelay;

        proxy_pass         http://ml_inference/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # ML can be slow
        proxy_read_timeout 300s;
    }

    # ── RFQ Agent ──────────────────────────────────────────────────────────
    location /agent/ {
        limit_req  zone=api_general burst=5 nodelay;

        proxy_pass         http://rfq_agent/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── MLflow UI (internal access only) ───────────────────────────────────
    location /mlflow/ {
        # Restrict to internal/admin access
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass         http://mlflow/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
