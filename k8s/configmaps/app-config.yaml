apiVersion: v1
kind: ConfigMap
metadata:
  name: ici-app-config
  namespace: ici
  labels:
    app.kubernetes.io/part-of: ici
data:
  # ── Application ────────────────────────────────────────────────────────────
  ENVIRONMENT:          "production"
  APP_NAME:             "Industrial Cost Intelligence"
  APP_VERSION:          "1.0.0"
  LOG_LEVEL:            "INFO"
  LOG_JSON:             "true"
  DEBUG:                "false"

  # ── Service hostnames (K8s DNS) ────────────────────────────────────────────
  POSTGRES_HOST:        "postgres.ici.svc.cluster.local"
  POSTGRES_PORT:        "5432"
  POSTGRES_DB:          "ici"
  POSTGRES_USER:        "ici"

  REDIS_HOST:           "redis-master.ici.svc.cluster.local"
  REDIS_PORT:           "6379"

  QDRANT_HOST:          "qdrant.ici.svc.cluster.local"
  QDRANT_PORT:          "6333"
  QDRANT_GRPC_PORT:     "6334"
  QDRANT_URL:           "http://qdrant.ici.svc.cluster.local:6333"

  MLFLOW_HOST:          "mlflow.ici.svc.cluster.local"
  MLFLOW_PORT:          "5000"
  MLFLOW_TRACKING_URI:  "http://mlflow.ici.svc.cluster.local:5000"

  # ── Backend ────────────────────────────────────────────────────────────────
  BACKEND_HOST:         "0.0.0.0"
  BACKEND_PORT:         "8000"
  BACKEND_WORKERS:      "4"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS:   "30"
  ALGORITHM:            "HS256"

  # ── ML ─────────────────────────────────────────────────────────────────────
  ML_HOST:              "0.0.0.0"
  ML_PORT:              "8002"
  ML_WORKERS:           "2"
  ML_USE_MOCK_EMBEDDER: "false"
  VECTOR_BACKEND:       "pgvector"
  ML_MLFLOW_REGISTRY_NAME: "cost-predictor"

  # ── Worker ─────────────────────────────────────────────────────────────────
  WORKER_CONCURRENCY:   "4"
  WORKER_MAX_JOBS:      "100"

  # ── RFQ Agent ──────────────────────────────────────────────────────────────
  RFQ_PLAYWRIGHT_HEADLESS: "true"
  RFQ_MAX_EMAILS_PER_HOUR: "20"
  RFQ_EMAIL_BACKEND:    "smtp"

  # ── Observability ──────────────────────────────────────────────────────────
  OTEL_ENABLED:         "true"
  OTEL_SERVICE_NAME:    "ici-backend"
  OTEL_ENDPOINT:        "http://otel-collector.ici-observability.svc.cluster.local:4317"
  PROMETHEUS_PORT:      "9090"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ici-nginx-config
  namespace: ici
  labels:
    app.kubernetes.io/part-of: ici
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    worker_rlimit_nofile 65535;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 75s;
        server_tokens off;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript application/xml;

        add_header X-Frame-Options         "SAMEORIGIN"   always;
        add_header X-Content-Type-Options  "nosniff"      always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        limit_req_zone  $binary_remote_addr zone=api:10m   rate=60r/m;
        limit_req_zone  $binary_remote_addr zone=auth:10m  rate=10r/m;
        limit_conn_zone $binary_remote_addr zone=conn:10m;

        upstream backend {
            least_conn;
            server ici-backend:8000;
            keepalive 32;
        }

        upstream ml {
            server ici-ml-inference:8002;
            keepalive 8;
        }

        server {
            listen 80;
            server_name _;

            location = /health {
                access_log off;
                return 200 '{"status":"ok"}';
                add_header Content-Type application/json;
            }

            location /api/ {
                limit_req  zone=api burst=20 nodelay;
                limit_conn conn 20;
                proxy_pass         http://backend;
                proxy_http_version 1.1;
                proxy_set_header   Connection        "";
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_set_header   X-Request-ID      $request_id;
            }

            location ~ ^/api/v[0-9]+/auth/ {
                limit_req  zone=auth burst=5 nodelay;
                proxy_pass         http://backend;
                proxy_http_version 1.1;
                proxy_set_header   Connection        "";
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            location /ml/ {
                limit_req  zone=api burst=10 nodelay;
                proxy_pass         http://ml/;
                proxy_http_version 1.1;
                proxy_set_header   Connection        "";
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_read_timeout 300s;
            }

            location ~ /\. {
                deny all;
            }
        }
    }
