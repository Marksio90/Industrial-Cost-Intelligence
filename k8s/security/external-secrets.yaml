# ═══════════════════════════════════════════════════════════════════════════════
# External Secrets Operator — syncs secrets from AWS Secrets Manager into K8s.
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace \
#     --set installCRDs=true
#
# IAM: the K8s service account needs secretsmanager:GetSecretValue on the ARN.
# Using IRSA (IAM Roles for Service Accounts) — no long-lived credentials in pods.
# ═══════════════════════════════════════════════════════════════════════════════

# ── IRSA ServiceAccount ───────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ici-external-secrets
  namespace: ici
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/ici-external-secrets"
---
# ── SecretStore — points to AWS Secrets Manager ───────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ici-aws-secret-store
  namespace: ici
spec:
  provider:
    aws:
      service:    SecretsManager
      region:     eu-central-1           # <── change per environment
      auth:
        jwt:
          serviceAccountRef:
            name: ici-external-secrets
---
# ── Vault SecretStore (alternative) ──────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ici-vault-secret-store
  namespace: ici
spec:
  provider:
    vault:
      server:      "https://vault.internal.ici.example.com"
      path:        "secret"
      version:     "v2"
      namespace:   "ici"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role:      "ici-backend"
          serviceAccountRef:
            name: ici-backend
---
# ── ExternalSecret — main application secrets ─────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ici-secrets
  namespace: ici
  labels:
    app.kubernetes.io/part-of: ici
spec:
  refreshInterval: 5m

  secretStoreRef:
    name: ici-aws-secret-store
    kind: SecretStore

  target:
    name:             ici-secrets
    creationPolicy:   Owner
    deletionPolicy:   Retain
    template:
      type: Opaque
      engineVersion: v2
      # Build composite URL strings from individual secret fields
      data:
        DATABASE_URL: >-
          postgresql+asyncpg://{{ .pg_user }}:{{ .pg_password }}@postgres.ici.svc.cluster.local:5432/ici
        DATABASE_URL_SYNC: >-
          postgresql://{{ .pg_user }}:{{ .pg_password }}@postgres.ici.svc.cluster.local:5432/ici
        REDIS_URL: >-
          redis://:{{ .redis_password }}@redis-master.ici.svc.cluster.local:6379/0
        REDIS_CACHE_URL: >-
          redis://:{{ .redis_password }}@redis-master.ici.svc.cluster.local:6379/0
        REDIS_QUEUE_URL: >-
          redis://:{{ .redis_password }}@redis-master.ici.svc.cluster.local:6379/1
        REDIS_PUBSUB_URL: >-
          redis://:{{ .redis_password }}@redis-master.ici.svc.cluster.local:6379/2
        WORKER_QUEUE_URL: >-
          redis://:{{ .redis_password }}@redis-master.ici.svc.cluster.local:6379/1
        RFQ_REDIS_URL: >-
          redis://:{{ .redis_password }}@redis-master.ici.svc.cluster.local:6379/2
        ML_REDIS_URL: >-
          redis://:{{ .redis_password }}@redis-master.ici.svc.cluster.local:6379/0
        RFQ_DATABASE_URL: >-
          postgresql+asyncpg://{{ .pg_user }}:{{ .pg_password }}@postgres.ici.svc.cluster.local:5432/ici
        ML_DATABASE_URL: >-
          postgresql+asyncpg://{{ .pg_user }}:{{ .pg_password }}@postgres.ici.svc.cluster.local:5432/ici
        MLFLOW_BACKEND_STORE_URI: >-
          postgresql://{{ .pg_user }}:{{ .pg_password }}@postgres.ici.svc.cluster.local:5432/ici

  data:
    # Flat field mappings: K8s Secret key → AWS Secrets Manager field
    - secretKey: pg_user
      remoteRef:
        key:      "ici/production/postgres"
        property: "username"
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key:      "ici/production/postgres"
        property: "password"
    - secretKey: pg_password
      remoteRef:
        key:      "ici/production/postgres"
        property: "password"
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key:      "ici/production/redis"
        property: "password"
    - secretKey: redis_password
      remoteRef:
        key:      "ici/production/redis"
        property: "password"
    - secretKey: SECRET_KEY
      remoteRef:
        key:      "ici/production/app"
        property: "jwt_secret_key"
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key:      "ici/production/app"
        property: "anthropic_api_key"
    - secretKey: QDRANT_API_KEY
      remoteRef:
        key:      "ici/production/qdrant"
        property: "api_key"
    - secretKey: CORS_ORIGINS
      remoteRef:
        key:      "ici/production/app"
        property: "cors_origins"
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key:      "ici/production/aws"
        property: "access_key_id"
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key:      "ici/production/aws"
        property: "secret_access_key"
    - secretKey: ENCRYPTION_KEYS
      remoteRef:
        key:      "ici/production/encryption"
        property: "keys"
    - secretKey: ENCRYPTION_PRIMARY_KEY_ID
      remoteRef:
        key:      "ici/production/encryption"
        property: "primary_key_id"
    - secretKey: RFQ_SMTP_USERNAME
      remoteRef:
        key:      "ici/production/smtp"
        property: "username"
    - secretKey: RFQ_SMTP_PASSWORD
      remoteRef:
        key:      "ici/production/smtp"
        property: "password"
    - secretKey: GRAFANA_ADMIN_USER
      remoteRef:
        key:      "ici/production/grafana"
        property: "admin_user"
    - secretKey: GRAFANA_ADMIN_PASSWORD
      remoteRef:
        key:      "ici/production/grafana"
        property: "admin_password"
---
# ── Encryption key rotation secret ────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ici-encryption-keys
  namespace: ici
spec:
  refreshInterval: 1h    # Encryption keys rotate less frequently

  secretStoreRef:
    name: ici-aws-secret-store
    kind: SecretStore

  target:
    name:           ici-encryption-keys
    creationPolicy: Owner
    deletionPolicy: Retain

  data:
    - secretKey: ENCRYPTION_KEYS
      remoteRef:
        key:      "ici/production/encryption"
        property: "keys"
    - secretKey: ENCRYPTION_PRIMARY_KEY_ID
      remoteRef:
        key:      "ici/production/encryption"
        property: "primary_key_id"
