apiVersion: v1
kind: ResourceQuota
metadata:
  name: ici-quota
  namespace: ici
spec:
  hard:
    requests.cpu:    "20"
    requests.memory: 40Gi
    limits.cpu:      "40"
    limits.memory:   80Gi
    pods:            "100"
    services:        "20"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ici-defaults
  namespace: ici
spec:
  limits:
    - type: Container
      default:
        cpu:    "500m"
        memory: "512Mi"
      defaultRequest:
        cpu:    "100m"
        memory: "128Mi"
      max:
        cpu:    "8"
        memory: "16Gi"
      min:
        cpu:    "10m"
        memory: "32Mi"
    - type: Pod
      max:
        cpu:    "16"
        memory: "32Gi"
