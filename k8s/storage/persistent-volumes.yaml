# ─────────────────────────────────────────────────────────────────────────────
# PersistentVolumeClaims for stateful workloads.
# StorageClass "gp3" assumes AWS EKS with the EBS CSI driver.
# Replace with the appropriate StorageClass for your cloud provider:
#   GKE:    "premium-rwo" / "standard-rwo"
#   AKS:    "managed-premium" / "managed-csi-premium"
#   bare-metal: "local-path" (Rancher) or "longhorn"
# ─────────────────────────────────────────────────────────────────────────────

# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: ici
  labels:
    app.kubernetes.io/name:      postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of:   ici
  annotations:
    # Retain volume on PVC deletion to prevent accidental data loss
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 100Gi
---
# ── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: ici
  labels:
    app.kubernetes.io/name:      redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of:   ici
