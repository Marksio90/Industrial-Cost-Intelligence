---
# ── ML Model Cache (HuggingFace / sentence-transformers) ──────────────────────
# ReadWriteMany so multiple ML pods can share pre-downloaded models.
# Requires an RWX-capable StorageClass (e.g. EFS on EKS, NFS provisioner).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-models-pvc
  namespace: ici
  labels:
    app.kubernetes.io/name:      ici-ml-inference
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of:   ici
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc   # AWS EFS CSI; replace for other clouds
  resources:
    requests:
      storage: 50Gi
---
# ── MLflow Artifacts ──────────────────────────────────────────────────────────
# In production, prefer S3 (set MLFLOW_DEFAULT_ARTIFACT_ROOT=s3://...).
# This PVC is a fallback for environments without object storage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts-pvc
  namespace: ici
  labels:
    app.kubernetes.io/name:      mlflow
    app.kubernetes.io/component: mlops
    app.kubernetes.io/part-of:   ici
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 100Gi
---
