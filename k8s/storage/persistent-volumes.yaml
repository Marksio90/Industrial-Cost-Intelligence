---
# ── Qdrant ────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data-pvc
  namespace: ici
  labels:
    app.kubernetes.io/name:      qdrant
