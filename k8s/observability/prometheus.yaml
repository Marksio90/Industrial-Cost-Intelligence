# ─────────────────────────────────────────────────────────────────────────────
# Prometheus — deployed in ici-observability namespace
# For production, consider kube-prometheus-stack Helm chart instead:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace ici-observability --create-namespace \
#     --values k8s/observability/kube-prometheus-values.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── RBAC ──────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: ici-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind:     ClusterRole
  name:     prometheus
subjects:
  - kind:      ServiceAccount
    name:      prometheus
    namespace: ici-observability
---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ici-observability
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        environment: production
        cluster:     ici-prod

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    scrape_configs:

      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

      # ── Auto-discover pods with prometheus.io/scrape=true ─────────────────
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ici, ici-observability]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # ── K8s API server ────────────────────────────────────────────────────
      - job_name: kubernetes-apiservers
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # ── Node exporter ─────────────────────────────────────────────────────
      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

  # ── Alert rules ─────────────────────────────────────────────────────────────
  ici-alerts.yml: |
    groups:
      - name: ici.backend
        interval: 30s
        rules:
          - alert: BackendDown
            expr: up{job="kubernetes-pods", app_kubernetes_io_name="ici-backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "ICI Backend pod is down"
              description: "Pod {{ $labels.pod }} has been down for > 1 minute"

          - alert: HighErrorRate
            expr: |
              rate(http_requests_total{app_kubernetes_io_name="ici-backend",status=~"5.."}[5m])
              / rate(http_requests_total{app_kubernetes_io_name="ici-backend"}[5m]) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High backend error rate (>5%)"

          - alert: HighLatencyP99
            expr: |
              histogram_quantile(0.99,
                rate(http_request_duration_seconds_bucket{app_kubernetes_io_name="ici-backend"}[5m])
              ) > 2.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Backend P99 latency > 2s"

      - name: ici.ml
        interval: 60s
        rules:
          - alert: MLInferenceDown
            expr: up{app_kubernetes_io_name="ici-ml-inference"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "ML Inference pod is down"

          - alert: MLMAPEDrift
            expr: ici_ml_mape_ewma > 0.30
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "ML model MAPE EWMA > 30% — possible drift"

      - name: ici.infra
        interval: 30s
        rules:
          - alert: PostgresDown
            expr: up{app_kubernetes_io_name="postgres"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is unreachable"

          - alert: RedisDown
            expr: up{app_kubernetes_io_name="redis"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis is unreachable"

          - alert: PVCNearFull
            expr: |
              (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is >85% full"

          - alert: WorkerQueueBacklog
            expr: redis_list_length{list="arq:queue:default"} > 500
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Worker queue backlog > 500 jobs"
---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ici-observability
  labels:
    app.kubernetes.io/name:      prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of:   ici-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  strategy:
    type: Recreate   # TSDB doesn't support concurrent writers
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      prometheus
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of:   ici-observability
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser:    65534   # nobody
        fsGroup:      65534
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=30d
            - --storage.tsdb.retention.size=45GB
            - --web.enable-lifecycle       # allow hot-reload via POST /-/reload
            - --web.enable-admin-api
            - --web.route-prefix=/
          ports:
            - name: http
              containerPort: 9090

          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds:       15
            timeoutSeconds:      5
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: ici-alerts.yml
                path: ici-alerts.yml
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data-pvc
        - name: tmp
          emptyDir: {}
---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ici-observability
  labels:
    app.kubernetes.io/name:      prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of:   ici-observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
