# ─────────────────────────────────────────────────────────────────────────────
# Loki (single-binary mode) + Promtail DaemonSet
# For high-volume production, use Loki distributed mode via Helm:
#   helm install loki grafana/loki --namespace ici-observability \
#     --set loki.commonConfig.replication_factor=1 \
#     --set loki.storage.type=s3 \
#     --values k8s/observability/loki-values.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Loki ConfigMap ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: ici-observability
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level:        warn

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory:  /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store:     boltdb-shipper
          object_store: filesystem
          schema:    v12
          index:
            prefix: loki_index_
            period: 24h

    ruler:
      alertmanager_url: http://localhost:9093

    limits_config:
      # Ingest
      ingestion_rate_mb:       64
      ingestion_burst_size_mb: 128
      max_streams_per_user:    10000
      max_line_size:           256KB
      # Query
      max_query_parallelism:   8
      max_entries_limit_per_query: 10000
      max_query_series:        500
      # Retention
      retention_period: 720h   # 30 days

    compactor:
      working_directory: /loki/compactor
      shared_store:      filesystem
      retention_enabled: true

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active
        cache_location:         /loki/boltdb-shipper-cache
        cache_ttl:              24h
        shared_store:           filesystem
      filesystem:
        directory: /loki/chunks

    chunk_store_config:
      max_look_back_period: 0s

    table_manager:
      retention_deletes_enabled: true
      retention_period:          720h
---
# ── Loki Deployment ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: ici-observability
  labels:
    app.kubernetes.io/name:      loki
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of:   ici-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      loki
        app.kubernetes.io/component: logging
        app.kubernetes.io/part-of:   ici-observability
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    10001
        runAsGroup:   10001
        fsGroup:      10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: loki
          image: grafana/loki:2.9.7
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
            - name: grpc
              containerPort: 9096

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds:       15
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds:       10
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          persistentVolumeClaim:
            claimName: loki-data-pvc
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: ici-observability
  labels:
    app.kubernetes.io/name:      loki
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of:   ici-observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: loki
  ports:
    - name: http
      port: 3100
      targetPort: http
    - name: grpc
      port: 9096
      targetPort: grpc
---
# ── Promtail DaemonSet — scrapes pod logs from all nodes ──────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: ici-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, watch, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind:     ClusterRole
  name:     promtail
subjects:
  - kind:      ServiceAccount
    name:      promtail
    namespace: ici-observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: ici-observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.ici-observability.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: ici

    scrape_configs:

      # ── Kubernetes pod logs ──────────────────────────────────────────────
      - job_name: kubernetes-pods
        pipeline_stages:
          # Parse JSON log lines from ICI services
          - json:
              expressions:
                level:   levelname
                message: message
                logger:  name
                ts:      asctime
          - labels:
              level:
              logger:
          - timestamp:
              source: ts
              format: "2006-01-02T15:04:05"
          # Drop noisy health-check logs
          - drop:
              expression: '.*GET /health.*'
              drop_counter_reason: health_check

        kubernetes_sd_configs:
          - role: pod

        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          - replacement:  /var/log/pods/*$1/*.log
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator:    /
            target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: ici-observability
  labels:
    app.kubernetes.io/name:      promtail
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of:   ici-observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      promtail
        app.kubernetes.io/component: logging
        app.kubernetes.io/part-of:   ici-observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9080"
    spec:
      serviceAccountName: promtail
      # Promtail must run as root to read /var/log/pods
      securityContext:
        runAsUser:  0
        runAsGroup: 0

      tolerations:
        - key:    node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key:    node-role.kubernetes.io/master
          effect: NoSchedule

      containers:
        - name: promtail
          image: grafana/promtail:2.9.7
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - name: http
              containerPort: 9080

          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "256Mi"

          securityContext:
            readOnlyRootFilesystem:   true
            allowPrivilegeEscalation: false

          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly:  true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly:  true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: tmp
          emptyDir: {}
