apiVersion: apps/v1
kind: Deployment
metadata:
  name: ici-worker
  namespace: ici
  labels:
    app.kubernetes.io/name:      ici-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of:   ici
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: ici-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      ici-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of:   ici
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: ici-worker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120   # let in-flight jobs finish

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ici-worker

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ici-worker
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z $REDIS_HOST $REDIS_PORT; do
                echo "waiting for redis..."; sleep 2
              done
          envFrom:
            - configMapRef:
                name: ici-app-config
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "50m", memory: "32Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: worker
          image: ghcr.io/your-org/ici-backend:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - arq
            - src.worker.WorkerSettings

          envFrom:
            - configMapRef:
                name: ici-app-config
            - secretRef:
                name: ici-secrets

          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "2000m"
              memory: "1Gi"

          # Workers don't expose HTTP — use process-level liveness
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import arq; print('ok')"
            initialDelaySeconds: 30
            periodSeconds:       60
            timeoutSeconds:      10
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
