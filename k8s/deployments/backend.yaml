apiVersion: apps/v1
kind: Deployment
metadata:
  name: ici-backend
  namespace: ici
  labels:
    app.kubernetes.io/name:      ici-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of:   ici
    app.kubernetes.io/version:   "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: ici-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0   # zero-downtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      ici-backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of:   ici
        app.kubernetes.io/version:   "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
        # Restart on config change
        checksum/config: "{{ include (print .Template.BasePath '/configmaps/app-config.yaml') . | sha256sum }}"
    spec:
      serviceAccountName: ici-backend
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60

      # Spread across nodes and zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ici-backend
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ici-backend

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ici-backend
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z $POSTGRES_HOST $POSTGRES_PORT; do
                echo "waiting for postgres..."; sleep 2
              done
          envFrom:
            - configMapRef:
                name: ici-app-config
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "50m", memory: "32Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

        - name: run-migrations
          image: ghcr.io/your-org/ici-backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: ici-app-config
            - secretRef:
                name: ici-secrets
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: backend
          image: ghcr.io/your-org/ici-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: ici-app-config
            - secretRef:
                name: ici-secrets

          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "2000m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds:       20
            timeoutSeconds:      5
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3

          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold:  30
            periodSeconds:     5

          lifecycle:
            preStop:
              exec:
                # Allow in-flight requests to drain before SIGTERM
                command: ["/bin/sh", "-c", "sleep 5"]

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
