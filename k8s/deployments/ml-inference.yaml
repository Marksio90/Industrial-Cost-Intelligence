apiVersion: apps/v1
kind: Deployment
metadata:
  name: ici-ml-inference
  namespace: ici
  labels:
    app.kubernetes.io/name:      ici-ml-inference
    app.kubernetes.io/component: ml
    app.kubernetes.io/part-of:   ici
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: ici-ml-inference
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      ici-ml-inference
        app.kubernetes.io/component: ml
        app.kubernetes.io/part-of:   ici
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8002"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: ici-ml-inference
      automountServiceAccountToken: false
      # Model loading is slow — give it time
      terminationGracePeriodSeconds: 90

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ici-ml-inference
                topologyKey: kubernetes.io/hostname
        # Prefer nodes with GPU/high-memory labels if available
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values: ["ml", "high-memory"]

      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-mlflow
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z $MLFLOW_HOST $MLFLOW_PORT; do
                echo "waiting for mlflow..."; sleep 3
              done
          envFrom:
            - configMapRef:
                name: ici-app-config
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "50m", memory: "32Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: ml-inference
          image: ghcr.io/your-org/ici-ml-inference:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP

          envFrom:
            - configMapRef:
                name: ici-app-config
            - secretRef:
                name: ici-secrets

          env:
            - name: HF_HOME
              value: /app/.cache/huggingface
            - name: TRANSFORMERS_CACHE
              value: /app/.cache/huggingface
            # Constrain OpenMP threads to match CPU limit
            - name: OMP_NUM_THREADS
              value: "4"
            - name: OPENBLAS_NUM_THREADS
              value: "4"

          resources:
            requests:
              cpu:    "1000m"
              memory: "2Gi"
            limits:
              cpu:    "4000m"
              memory: "8Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60   # model loading
            periodSeconds:       30
            timeoutSeconds:      10
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 45
            periodSeconds:       15
            timeoutSeconds:      5
            failureThreshold:    5

          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60    # up to 5 minutes for cold start
            periodSeconds:    5

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: ml-models
              mountPath: /app/.cache/huggingface
            - name: mlflow-artifacts
              mountPath: /mlflow/artifacts
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: ml-models
          persistentVolumeClaim:
            claimName: ml-models-pvc
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
        - name: tmp
          emptyDir: {}
---
# ── RFQ Agent ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ici-rfq-agent
  namespace: ici
  labels:
    app.kubernetes.io/name:      ici-rfq-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of:   ici
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: ici-rfq-agent
  strategy:
    type: Recreate   # Only one agent instance to prevent duplicate RFQs
  template:
    metadata:
      labels:
        app.kubernetes.io/name:      ici-rfq-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of:   ici
    spec:
      serviceAccountName: ici-rfq-agent
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 300   # Let long LLM calls finish

      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: rfq-agent
          image: ghcr.io/your-org/ici-backend:latest
          imagePullPolicy: Always
          command:
            - uvicorn
            - rfq_agent.main:create_api
            - --host
            - "0.0.0.0"
            - --port
            - "8001"
            - --workers
            - "1"
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP

          envFrom:
            - configMapRef:
                name: ici-app-config
            - secretRef:
                name: ici-secrets

          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds:       30
            timeoutSeconds:      5
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: playwright-cache
              mountPath: /home/appuser/.cache/ms-playwright

      volumes:
        - name: tmp
          emptyDir: {}
        - name: playwright-cache
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
