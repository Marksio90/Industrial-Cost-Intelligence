apiVersion: v1
kind: Secret
metadata:
  name: ici-secrets
  namespace: ici
  labels:
    app.kubernetes.io/part-of: ici
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_PASSWORD:          "CHANGEME"
  DATABASE_URL:               "postgresql+asyncpg://ici:CHANGEME@postgres.ici.svc.cluster.local:5432/ici"
  DATABASE_URL_SYNC:          "postgresql://ici:CHANGEME@postgres.ici.svc.cluster.local:5432/ici"
  ML_DATABASE_URL:            "postgresql+asyncpg://ici:CHANGEME@postgres.ici.svc.cluster.local:5432/ici"
  RFQ_DATABASE_URL:           "postgresql+asyncpg://ici:CHANGEME@postgres.ici.svc.cluster.local:5432/ici"
  MLFLOW_BACKEND_STORE_URI:   "postgresql://ici:CHANGEME@postgres.ici.svc.cluster.local:5432/ici"

  # Redis
  REDIS_PASSWORD:             "CHANGEME"
  REDIS_URL:                  "redis://:CHANGEME@redis-master.ici.svc.cluster.local:6379/0"
  REDIS_CACHE_URL:            "redis://:CHANGEME@redis-master.ici.svc.cluster.local:6379/0"
  REDIS_QUEUE_URL:            "redis://:CHANGEME@redis-master.ici.svc.cluster.local:6379/1"
  REDIS_PUBSUB_URL:           "redis://:CHANGEME@redis-master.ici.svc.cluster.local:6379/2"
  WORKER_QUEUE_URL:           "redis://:CHANGEME@redis-master.ici.svc.cluster.local:6379/1"
  RFQ_REDIS_URL:              "redis://:CHANGEME@redis-master.ici.svc.cluster.local:6379/2"
  ML_REDIS_URL:               "redis://:CHANGEME@redis-master.ici.svc.cluster.local:6379/0"

  # Qdrant
  QDRANT_API_KEY:             "CHANGEME"

  # Auth
  SECRET_KEY:                 "CHANGEME_super_secret_jwt_key_at_least_32_chars"

  # CORS (JSON array)
  CORS_ORIGINS:               '["https://app.ici.example.com"]'

  # Anthropic
  ANTHROPIC_API_KEY:          "sk-ant-CHANGEME"

  # SMTP
  RFQ_SMTP_HOST:              "smtp.gmail.com"
  RFQ_SMTP_PORT:              "587"
  RFQ_SMTP_USERNAME:          "CHANGEME"
  RFQ_SMTP_PASSWORD:          "CHANGEME"
  RFQ_SMTP_FROM_EMAIL:        "procurement@example.com"
  RFQ_SMTP_FROM_NAME:         "ICI Procurement"
  RFQ_IMAP_HOST:              "imap.gmail.com"
  RFQ_IMAP_USERNAME:          "CHANGEME"
  RFQ_IMAP_PASSWORD:          "CHANGEME"

  # MLflow / S3
  AWS_ACCESS_KEY_ID:          "CHANGEME"
  AWS_SECRET_ACCESS_KEY:      "CHANGEME"
  MLFLOW_DEFAULT_ARTIFACT_ROOT: "s3://ici-mlflow-artifacts"

  # Grafana
  GRAFANA_ADMIN_USER:         "admin"
  GRAFANA_ADMIN_PASSWORD:     "CHANGEME"
